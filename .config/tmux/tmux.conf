bind-key -n M-1 selectw -t 1
bind-key -n M-2 selectw -t 2
bind-key -n M-3 selectw -t 3
bind-key -n M-4 selectw -t 4
bind-key -n M-5 selectw -t 5
bind-key -n M-6 selectw -t 6
bind-key -n C-f if-shell "echo '#{socket_path}' | grep 'alacritty'" "display-popup -E projects-terminal-sessioniser.sh" "display-popup -E projects-text-editor-sessionsier.sh"
unbind-key C-b

set -g prefix C-Space
set -g default-shell "/usr/bin/zsh"
set -g default-command "/usr/bin/zsh -l"

set-option -g history-limit 100000

set -g update-environment "TERM_EMULATOR"

# images in nvim in kitty to work
set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events on

set-environment -g FZF_DEFAULT_OPTS "--color=pointer:#2D4A38,prompt:#6DB33F,label:#ffffff --border"
set-option -g popup-border-lines none
set -g base-index 1
set -g status "on"
set -g status-bg "#2d4a38"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right ""
set -g status-interval 1
set -g mouse on
set -g focus-events 1
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",tmux-256color:RGB"
set -ag terminal-overrides ',alacritty:smcup@:rmcup@'
set -ag terminal-overrides ",xterm-256color:RGB"

set -g status-left '#[fg=#ffffff,bg=#6db33f,bold] #S #[fg=#6db33f,bg=#3a5f47,nobold]#[fg=#a8c9b0,bg=#3a5f47] #(cd #{pane_current_path} && git rev-parse --is-inside-work-tree >/dev/null 2>&1 && echo " $(git rev-parse --abbrev-ref HEAD) ")#[fg=#3a5f47,bg=#2d4a38]'

# Inactive windows
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#7aab8a,bg=#2d4a38] #I #[fg=#7aab8a,bg=#2d4a38]#W "

# Active window
setw -g window-status-current-format "#[fg=#2d4a38,bg=#4a7c59]#[fg=#d4e6da,bg=#4a7c59,bold] #I #[fg=#d4e6da,bg=#4a7c59]#{?window_zoomed_flag,#[fg=#f0e68c][] ,}#W #[fg=#4a7c59,bg=#2d4a38]"

set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
set -g pane-border-style 'bg=default'
set -g pane-active-border-style 'bg=default'
